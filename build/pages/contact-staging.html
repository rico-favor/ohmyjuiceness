<!-- Inquiry preselect: home "Join the Waitlist" CTA deep-links /contact-staging/?inquiry=franchising; this preselects the form dropdown. Keep. -->
<script>
document.addEventListener('DOMContentLoaded', function(){
  var p = new URLSearchParams(location.search).get('inquiry');
  if (!p) return;
  var sel = document.querySelector('form.elementor-form select');
  if (!sel) return;
  Array.from(sel.options).forEach(function(o){
    if (o.text.toLowerCase().indexOf(p.toLowerCase()) > -1) {
      sel.value = o.value;
      sel.dispatchEvent(new Event('change', {bubbles:true}));
    }
  });
});
</script>
