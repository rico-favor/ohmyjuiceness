<style>
  .omj-map { width: 100%; }
  .omj-map svg {

  .omj-map .omj-visually-hidden {

    clip: rect(0 0 0 0);

  .omj-map text { font-family: var(--omj-font-body, 'Poppins', sans-serif); }
  .omj-map__label {

  .omj-map__wm {
    font-size: 22px;
    fill: var(--omj-green, #167A45);
    opacity: .15;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 1.5px;
  }
  .omj-map__bay {
    font-size: 15px;
    fill: var(--omj-green, #167A45);

    font-style: italic;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .omj-map__loc { cursor: pointer; }
  .omj-map__loc:focus { outline: none; }
  .omj-map__loc:focus-visible {
    outline: 3px solid var(--omj-red-orange, #E24F14);
    outline-offset: 3px;
    border-radius: 6px;
  }

  /* citrus marker: hover / focus lift + label emphasis */
  .omj-map__marker {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform .25s cubic-bezier(.22,.61,.36,1);
  }
  .omj-map__loc:hover .omj-map__marker,
  .omj-map__loc:focus-visible .omj-map__marker { transform: scale(1.15); }
  .omj-map__loc:hover .omj-map__label,
  .omj-map__loc:focus-visible .omj-map__label { font-weight: 700; }

  /* idle ripple radiating from each pin */
  .omj-map__ripple {
    fill: none;
    stroke: var(--omj-orange, #FF8E06);
    stroke-width: 2;
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    animation: omj-map-ripple 3s ease-out infinite;
  }
  @keyframes omj-map-ripple {
    0%   { transform: scale(.45); opacity: .35; }
    70%  { opacity: .05; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* pins pop in once the wrapper is revealed by site JS */
  .omj-map.is-inview .omj-map__marker {
    animation: omj-map-pop .35s cubic-bezier(.22,.61,.36,1) backwards;
    animation-delay: calc(var(--i, 0) * .1s);
  }
  @keyframes omj-map-pop {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  /* honour reduced-motion (media query + site root class) */
  @media (prefers-reduced-motion: reduce) {
    .omj-map__ripple { animation: none; opacity: 0; }
    .omj-map .omj-map__marker,
    .omj-map.is-inview .omj-map__marker { animation: none; transition: none; transform: none; }
  }
  .omj-motion-reduced .omj-map .omj-map__ripple { animation: none; opacity: 0; }
  .omj-motion-reduced .omj-map .omj-map__marker,
  .omj-motion-reduced .omj-map.is-inview .omj-map__marker { animation: none; transition: none; transform: none; }
